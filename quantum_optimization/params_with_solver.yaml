seed: 12345
output_folder: "./delme_solver"
backend_name: null                     # [null, "<backend_name>"]
is_backend_fake: True

problem_class: "QGSUncProblem"        # [MaxCutProblem, QGSProblem, QGSUncProblem]
problem_params:
  n_nodes: 7                           # MaxCutProblem
  density: 0.7                         # MaxCutProblem
  num_groups: 5                        # QGSProblem
  num_instruments_per_group: 3         # QGSProblem

# Generic solver entry point.
# Valid examples: "FWALSolver", "QAOASolver", "ClassicalSolver"
solver_class: "FWALSolver"

solver_params:

  # ---- FWALSolver params -------------------------------------------
  num_fw_iterations: 12
  beta0: 1.0
  dual_step_rule: "constant"
  rounding_project: True
  convergence_tol: 1.0e-4
  plot_output_folder: "./plots"

  # Nested LMO solver config for FWALSolver.
  # class: "ClassicalSolver" (default) or "QAOASolver"
  lmo_solver_class: "ClassicalSolver"
  lmo_solver_params: {}

  # Example QAOA-based LMO config:
  # lmo_solver_class: "QAOASolver"
  # lmo_solver_params:
  #   circuit_class: "AncillaQAOACircuit"
  #   num_layers: 1
  #   num_starting_points: 3
  #   lower_bound: 0.0
  #   upper_bound: 6.2832
  #   num_estimator_shots: 1024
  #   num_sampler_shots: 2048

